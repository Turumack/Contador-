<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker Local</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { margin-top: 0; }
        .counter-display {
            font-size: 3rem;
            font-weight: bold;
            color: #0056b3;
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            color: white;
            transition: background 0.3s;
        }
        #clickBtn { background-color: #28a745; font-size: 1.2rem; padding: 15px 30px; }
        #clickBtn:hover { background-color: #218838; }
        #exportBtn { background-color: #007bff; }
        #exportBtn:hover { background-color: #0069d9; }
        #clearBtn { background-color: #dc3545; }
        #clearBtn:hover { background-color: #c82333; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Mi Clicker</h1>
        <div class="counter-display" id="counter">0</div>
        
        <button id="clickBtn">¡Sumar Clic!</button>
        <br><br>
        <button id="exportBtn">Exportar a CSV</button>
        <button id="clearBtn">Borrar Datos Locales</button>
    </div>

    <script>
        // 1. Cargar el historial desde el almacenamiento local del navegador (o crear un array vacío)
        let clickHistory = JSON.parse(localStorage.getItem('clickData')) || [];
        const counterDisplay = document.getElementById('counter');
        
        // Mostrar el conteo inicial basado en el historial guardado
        counterDisplay.innerText = clickHistory.length;

        // 2. Función para registrar el clic
        document.getElementById('clickBtn').addEventListener('click', () => {
            const now = new Date();
            // Formatear fecha y hora para que sea fácil de leer (Ej: 25/3/2026, 16:45:00)
            const timeString = now.toLocaleString('es-CO'); 
            
            clickHistory.push(timeString);
            
            // Guardar en el navegador
            localStorage.setItem('clickData', JSON.stringify(clickHistory));
            
            // Actualizar el número en pantalla
            counterDisplay.innerText = clickHistory.length;
        });

        // 3. Función para exportar a CSV
        document.getElementById('exportBtn').addEventListener('click', () => {
            if (clickHistory.length === 0) {
                alert('No hay clics registrados para exportar.');
                return;
            }

            // Crear el contenido del CSV
            let csvContent = "Numero de Clic,Fecha y Hora\n";
            clickHistory.forEach((time, index) => {
                csvContent += `${index + 1},"${time}"\n`;
            });

            // Crear un objeto Blob para forzar la descarga
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            
            // Crear un enlace temporal y simular un clic para descargar
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "registro_clics.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // 4. Función para limpiar el almacenamiento
        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm('¿Estás seguro de que quieres borrar tu historial local de clics?')) {
                localStorage.removeItem('clickData');
                clickHistory = [];
                counterDisplay.innerText = 0;
            }
        });
    </script>
</body>
</html>
