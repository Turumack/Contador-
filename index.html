<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Casos y Hojas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .counters {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }
        .counter-box {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            width: 40%;
        }
        .counter-display {
            font-size: 2.5rem;
            font-weight: bold;
            color: #0056b3;
            margin-top: 10px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        select {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            color: white;
            transition: background 0.3s;
            width: 45%;
        }
        .action-btns {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        #btnCaso { background-color: #28a745; }
        #btnCaso:hover { background-color: #218838; }
        #btnHoja { background-color: #17a2b8; }
        #btnHoja:hover { background-color: #138496; }
        #exportBtn { background-color: #007bff; width: 100%; margin: 5px 0;}
        #exportBtn:hover { background-color: #0069d9; }
        #clearBtn { background-color: #dc3545; width: 100%; margin: 5px 0;}
        #clearBtn:hover { background-color: #c82333; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Registro de Revisión</h1>
        
        <div class="form-group">
            <label for="opcion1">Primera Opción (Categoría/Tipo):</label>
            <select id="opcion1">
                <option value="Sin seleccionar">-- Selecciona una opción --</option>
                <option value="Opción 1A">Opción 1A</option>
                <option value="Opción 1B">Opción 1B</option>
            </select>
        </div>

        <div class="form-group">
            <label for="opcion2">Segunda Opción (Detalle/Estado):</label>
            <select id="opcion2">
                <option value="Sin seleccionar">-- Selecciona una opción --</option>
                <option value="Opción 2A">Opción 2A</option>
                <option value="Opción 2B">Opción 2B</option>
            </select>
        </div>

        <div class="counters">
            <div class="counter-box">
                <div>Casos</div>
                <div class="counter-display" id="counterCaso">0</div>
            </div>
            <div class="counter-box">
                <div>Hojas</div>
                <div class="counter-display" id="counterHoja">0</div>
            </div>
        </div>
        
        <div class="action-btns">
            <button id="btnCaso">+ Contar Caso</button>
            <button id="btnHoja">+ Contar Hoja</button>
        </div>
        
        <hr>
        
        <button id="exportBtn">Exportar a CSV</button>
        <button id="clearBtn">Borrar Datos Locales</button>
    </div>

    <script>
        // 1. Cargar historial del LocalStorage
        let clickHistory = JSON.parse(localStorage.getItem('registroRevision')) || [];
        
        // Referencias a los contadores en el HTML
        const counterCasoDisplay = document.getElementById('counterCaso');
        const counterHojaDisplay = document.getElementById('counterHoja');

        // Función para actualizar los números en pantalla al cargar
        function actualizarPantalla() {
            const totalCasos = clickHistory.filter(item => item.tipo === 'Caso').length;
            const totalHojas = clickHistory.filter(item => item.tipo === 'Hoja').length;
            counterCasoDisplay.innerText = totalCasos;
            counterHojaDisplay.innerText = totalHojas;
        }
        
        actualizarPantalla(); // Se ejecuta al abrir la página

        // 2. Función principal para registrar el clic
        function registrarClic(tipoClic) {
            const op1 = document.getElementById('opcion1').value;
            const op2 = document.getElementById('opcion2').value;
            const now = new Date();
            const timeString = now.toLocaleString('es-CO'); // Fecha y hora local
            
            // Creamos un objeto con toda la información del momento del clic
            const nuevoRegistro = {
                tipo: tipoClic,
                fecha: timeString,
                seleccion1: op1,
                seleccion2: op2
            };

            clickHistory.push(nuevoRegistro);
            localStorage.setItem('registroRevision', JSON.stringify(clickHistory));
            
            actualizarPantalla();
        }

        // Asignar los eventos a los botones
        document.getElementById('btnCaso').addEventListener('click', () => registrarClic('Caso'));
        document.getElementById('btnHoja').addEventListener('click', () => registrarClic('Hoja'));

        // 3. Exportar a CSV (Actualizado para las nuevas columnas)
        document.getElementById('exportBtn').addEventListener('click', () => {
            if (clickHistory.length === 0) {
                alert('No hay registros para exportar.');
                return;
            }

            // Cabeceras del archivo CSV
            let csvContent = "ID,Tipo de Registro,Fecha y Hora,Opción 1,Opción 2\n";
            
            // Llenar las filas
            clickHistory.forEach((registro, index) => {
                // Las comillas evitan errores si las opciones tienen comas en su texto
                csvContent += `${index + 1},"${registro.tipo}","${registro.fecha}","${registro.seleccion1}","${registro.seleccion2}"\n`;
            });

            // Forzar descarga
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "registro_casos_hojas.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // 4. Limpiar datos
        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm('¿Estás seguro de que quieres borrar el historial de tu navegador?')) {
                localStorage.removeItem('registroRevision');
                clickHistory = [];
                actualizarPantalla();
            }
        });
    </script>
</body>
</html>
